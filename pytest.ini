[pytest]
; MEJ-1: red de seguridad automatizada. Ver docs/PLAN_MEJORA_1_RED_SEGURIDAD.md
testpaths = tests
norecursedirs = _legacy basura archived output _backup_iniciativa2 data layouts web_prototype
; El gate de regresion (marker "gate", ~30-60 s) NO corre por default.
; Para correrlo via pytest: python -m pytest -m gate
addopts = -m "not gate"
markers =
    gate: smoke del gate de regresion byte-identico (lento, corre la sim real)
